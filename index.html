<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarthak Handa | Links</title>
    
    <link rel="icon" href="logo.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ============================================================================
           FUTURISTIC LINKTREE-STYLE LANDING PAGE
           High-end glassmorphism with 3D depth, animations, and interactive effects
           ============================================================================ */

        /* Base Variables */
        :root {
            --bg-base: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            
            --btn-bg: #0a0a0a;
            --btn-text: #ffffff;
            --btn-text-muted: #a1a1aa;
            
            --accent-1: #6366f1;
            --accent-2: #ec4899;
            --accent-3: #06b6d4;
            
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-slow: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* * STRICT SINGLE PAGE LOCK 
         * Uses dynamic viewport height (dvh) to account for mobile browser UI bars.
         * overflow: hidden completely prevents scrolling.
         */
        html, body {
            height: 100vh; /* Fallback */
            height: 100dvh;
            width: 100vw;
            overflow: hidden; 
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            perspective: 1000px; /* Enables 3D space */
        }

        /* ============================================================================
           ADVANCED FUTURISTIC BACKGROUND WITH GRADIENT GLOW AND PARTICLES
           ============================================================================ */
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 20% 70%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
            animation: glowPulse 8s ease-in-out infinite, gradientDrift 20s linear infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }

        @keyframes gradientDrift {
            0% { transform: scale(1) translateX(0px); }
            50% { transform: scale(1.05) translateX(20px); }
            100% { transform: scale(1) translateX(0px); }
        }

        /* Animated Grid Background */
        .cyber-grid {
            position: fixed;
            bottom: -20%;
            left: -50%;
            width: 200%;
            height: 60vh;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotateX(75deg);
            transform-origin: top center;
            animation: gridMove 3s linear infinite;
            mask-image: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 80%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 80%);
            z-index: 0;
            pointer-events: none;
            will-change: transform;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        /* Subtle noise/grain texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="1"/></filter><rect width="200" height="200" filter="url(%23noiseFilter)" opacity="0.04"/></svg>');
            pointer-events: none;
            z-index: 0;
        }

        /* Cursor Glow - Ambient light following the cursor */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15), transparent 60%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
            will-change: transform;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: clamp(10px, 3vh, 40px) 24px;
            animation: containerFade 1.2s ease forwards;
        }

        @keyframes containerFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================================
           HEADER WITH ENHANCED PROFILE IMAGE AND GLOW EFFECTS
           ============================================================================ */

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: clamp(15px, 4vh, 36px);
            animation: headerSlideIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes headerSlideIn {
            0% { 
                opacity: 0; 
                transform: translateY(-20px);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        /* Profile Image Container for Glow Effects */
        .profile-wrapper {
            position: relative;
            width: clamp(60px, 12vh, 96px);
            height: clamp(60px, 12vh, 96px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: clamp(8px, 2vh, 16px);
        }

        /* Rotating Glow Ring Behind Profile */
        .profile-wrapper::before {
            content: '';
            position: absolute;
            width: 110%;
            height: 110%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #6366f1,
                #ec4899,
                #06b6d4,
                #6366f1
            );
            border-radius: 50%;
            opacity: 0;
            animation: glowRingRotate 8s linear infinite, fadeInGlow 1.5s ease-in-out 0.3s forwards;
            z-index: -1;
        }

        @keyframes glowRingRotate {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes fadeInGlow {
            0% { opacity: 0; }
            100% { opacity: 0.4; }
        }

        /* Soft radial light pulse behind profile */
        .profile-wrapper::after {
            content: '';
            position: absolute;
            width: 140%;
            height: 140%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
            animation: radialPulse 4s ease-in-out infinite 0.2s;
            z-index: -2;
        }

        @keyframes radialPulse {
            0%, 100% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eaeaea;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.1),
                0 0 20px rgba(99, 102, 241, 0.1);
            transition: var(--transition-smooth);
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
        }

        .profile-img:hover {
            transform: scale(1.1) rotateY(5deg) rotateX(-5deg);
            border-color: #6366f1;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.2),
                0 0 30px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: clamp(1.1rem, 3vh, 1.35rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 1.8vh, 0.95rem);
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ============================================================================
           LINKS CONTAINER AND 3D BUTTONS WITH MAGNETIC EFFECTS
           ============================================================================ */

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 2vh, 16px);
            perspective: 1000px;
        }

        /* Premium 3D Interactive Buttons with Glassmorphism */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: var(--btn-text);
            text-decoration: none;
            padding: clamp(12px, 2.5vh, 18px) 24px;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: visible;
            transform-style: preserve-3d;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.3s ease,
                        border-color 0.3s ease;
            
            /* Page Entry Animation */
            opacity: 0;
            transform: rotateX(-30deg) translateY(20px);
            animation: buttonFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            
            cursor: pointer;
            will-change: transform, box-shadow;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* Stagger the entrance of each button */
        .link-btn:nth-child(1) { animation-delay: 0.15s; }
        .link-btn:nth-child(2) { animation-delay: 0.25s; }
        .link-btn:nth-child(3) { animation-delay: 0.35s; }
        .link-btn:nth-child(4) { animation-delay: 0.45s; }
        .link-btn:nth-child(5) { animation-delay: 0.55s; }

        @keyframes buttonFadeIn {
            to { opacity: 1; transform: rotateX(0deg) translateY(0); }
        }

        /* Depth shadow layers */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 99px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Shimmer/Light sweep effect */
        .link-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.2), 
                transparent);
            transform: skewX(-25deg);
            border-radius: 99px;
            z-index: 1;
        }

        .link-btn:hover::after {
            left: 200%;
            transition: left 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Button Hover State - 3D Elevation with Glow */
        .link-btn:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.25),
                0 0 30px rgba(99, 102, 241, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
            background-color: #0a0a0a;
        }

        .link-btn:hover::before {
            opacity: 1;
        }

        /* Active State */
        .link-btn:active {
            transform: translateY(-2px) scale(0.99);
        }

        /* Icon Styles */
        .main-icon {
            font-size: clamp(1rem, 2.5vh, 1.25rem);
            color: var(--btn-text);
            width: 28px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 3;
            position: relative;
        }

        .link-btn:hover .main-icon {
            transform: scale(1.25) rotate(8deg);
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.3));
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-weight: 500;
            font-size: clamp(0.85rem, 2vh, 1rem);
            letter-spacing: -0.01em;
            padding: 0 16px;
            z-index: 3;
            position: relative;
        }

        .arrow-icon {
            font-size: clamp(0.85rem, 2vh, 1rem);
            color: var(--btn-text-muted);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.6;
            z-index: 3;
            position: relative;
        }

        .link-btn:hover .arrow-icon {
            color: var(--btn-text);
            opacity: 1;
            transform: translateX(6px);
        }

        /* ============================================================================
           SOCIAL ICONS WITH ENHANCED EFFECTS
           ============================================================================ */

        .socials-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: clamp(16px, 3vh, 28px);
            margin-top: clamp(20px, 4vh, 40px);
            padding: clamp(12px, 2vh, 18px) clamp(20px, 4vw, 32px);
            border-radius: 99px;
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 
                inset 0 2px 4px rgba(255, 255, 255, 0.8),
                0 8px 20px rgba(0, 0, 0, 0.06),
                0 0 20px rgba(99, 102, 241, 0.08);
            
            opacity: 0;
            animation: socialsSlideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
            will-change: transform;
        }

        @keyframes socialsSlideIn {
            0% { 
                opacity: 0; 
                transform: translateY(20px);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        .social-link {
            color: var(--text-muted);
            font-size: clamp(1.1rem, 3vh, 1.35rem);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: clamp(40px, 6vh, 50px);
            height: clamp(40px, 6vh, 50px);
            border-radius: 50%;
            position: relative;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* Social Icon Glow Ring */
        .social-link::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(99, 102, 241, 0.3),
                transparent 50%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .social-link:hover::before {
            opacity: 1;
            animation: socialGlowSpin 2s linear infinite;
        }

        @keyframes socialGlowSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .social-link:hover {
            color: var(--text-main);
            transform: scale(1.35) translateY(-4px);
            filter: drop-shadow(0 6px 12px rgba(99, 102, 241, 0.25));
            background-color: rgba(99, 102, 241, 0.1);
        }

        /* ============================================================================
           PARALLAX AND DEPTH EFFECTS
           ============================================================================ */

        /* Parallax background movement */
        .cyber-grid {
            will-change: transform;
        }

        /* Soft pulsing animation for buttons */
        @keyframes softPulse {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }

        .link-btn {
            animation: 
                buttonFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                softPulse 6s ease-in-out infinite;
        }

        .link-btn:nth-child(1) { animation-delay: 0.15s, 0.5s; }
        .link-btn:nth-child(2) { animation-delay: 0.25s, 0.6s; }
        .link-btn:nth-child(3) { animation-delay: 0.35s, 0.7s; }
        .link-btn:nth-child(4) { animation-delay: 0.45s, 0.8s; }
        .link-btn:nth-child(5) { animation-delay: 0.55s, 0.9s; }

        /* ============================================================================
           RESPONSIVE DESIGN
           ============================================================================ */

        @media (orientation: landscape) and (max-height: 500px) {
            .container { flex-direction: row; gap: 40px; }
            header { margin-bottom: 0; }
            .cyber-grid { display: none; }
            .links-container { justify-content: center; }
            .socials-container { position: absolute; bottom: 10px; padding: 8px 20px; margin-top: 0; }
        }

        /* Optimize for lower-end devices */
        @media (hover: none) and (pointer: coarse) {
            .link-btn {
                animation: 
                    buttonFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            
            .cyber-grid {
                animation: none;
            }
        }
    </style>
</head>

    <!-- Anime.js library for smooth spring animations (lightweight: ~14KB gzipped) -->
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

    <!-- ============================================================================
         INTERACTIVE EFFECTS JAVASCRIPT
         Magnetic hover, 3D tilt, parallax depth, cursor glow, and premium animations
         ============================================================================ -->
    <script>
        // ============================================================================
        // CURSOR GLOW - Ambient light following the mouse
        // ============================================================================
        const glowElement = document.querySelector('.cursor-glow');
        
        document.addEventListener('mousemove', (e) => {
            glowElement.style.left = e.clientX + 'px';
            glowElement.style.top = e.clientY + 'px';
        });

        // Reset glow when mouse leaves viewport
        document.addEventListener('mouseleave', () => {
            glowElement.style.opacity = '0';
        });

        document.addEventListener('mouseenter', () => {
            glowElement.style.opacity = '1';
        });

        // Performance optimization: use requestAnimationFrame for smooth animations
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        // Track mouse position for interactive effects
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // ============================================================================
        // MAGNETIC HOVER EFFECT - Buttons follow cursor
        // ============================================================================
        const buttons = document.querySelectorAll('.link-btn');
        
        buttons.forEach((btn) => {
            let isHovering = false;
            let btnX = 0;
            let btnY = 0;
            
            btn.addEventListener('mouseenter', () => {
                isHovering = true;
            });
            
            btn.addEventListener('mouseleave', () => {
                isHovering = false;
                // Smoothly return to original position
                anime({
                    targets: btn,
                    translateX: 0,
                    translateY: 0,
                    duration: 600,
                    easing: 'easeOutElastic(1, .6)'
                });
            });
            
            btn.addEventListener('mousemove', (e) => {
                if (!isHovering) return;
                
                const rect = btn.getBoundingClientRect();
                const btnCenterX = rect.left + rect.width / 2;
                const btnCenterY = rect.top + rect.height / 2;
                
                // Calculate distance from cursor to button center
                const distX = mouseX - btnCenterX;
                const distY = mouseY - btnCenterY;
                
                // Magnetic pull (max 15px movement)
                const maxDistance = 100;
                const distanceToMouse = Math.sqrt(distX * distX + distY * distY);
                const magnetStrength = Math.max(0, (maxDistance - distanceToMouse) / maxDistance);
                
                btnX = distX * magnetStrength * 0.15;
                btnY = distY * magnetStrength * 0.15;
                
                // Apply smooth magnetic movement
                anime.set(btn, {
                    translateX: btnX,
                    translateY: btnY
                });
            });
        });

        // ============================================================================
        // 3D TILT EFFECT - Buttons tilt based on cursor position
        // ============================================================================
        buttons.forEach((btn) => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                // Calculate rotation angles based on distance from center
                const angleX = (e.clientY - centerY) / rect.height * 8;
                const angleY = (centerX - e.clientX) / rect.width * 8;
                
                anime.set(btn, {
                    rotateX: angleX,
                    rotateY: angleY
                });
            });
            
            btn.addEventListener('mouseleave', () => {
                // Reset tilt
                anime({
                    targets: btn,
                    rotateX: 0,
                    rotateY: 0,
                    duration: 600,
                    easing: 'easeOutElastic(1, .6)'
                });
            });
        });

        // ============================================================================
        // PARALLAX DEPTH - Background and elements move with mouse
        // ============================================================================
        const cyberGrid = document.querySelector('.cyber-grid');
        
        document.addEventListener('mousemove', (e) => {
            // Calculate parallax offset (subtle, max 10px)
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            
            // Apply subtle parallax to grid
            if (cyberGrid) {
                anime.set(cyberGrid, {
                    translateX: moveX,
                    translateY: moveY
                });
            }
            
            // Apply subtle parallax to header
            const header = document.querySelector('header');
            if (header) {
                anime.set(header, {
                    translateX: moveX * 0.5,
                    translateY: moveY * 0.5
                });
            }
        });

        // ============================================================================
        // RIPPLE EFFECT ON BUTTON CLICK
        // ============================================================================
        buttons.forEach((btn) => {
            btn.addEventListener('click', (e) => {
                // Don't interfere with link navigation, just add visual feedback
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Add a subtle scale pulse for feedback
                anime({
                    targets: btn,
                    scale: [1, 1.05, 1],
                    duration: 400,
                    easing: 'easeOutQuad'
                });
            });
        });

        // ============================================================================
        // SOCIAL ICONS - Enhanced hover with bounce
        // ============================================================================
        const socialLinks = document.querySelectorAll('.social-link');
        
        socialLinks.forEach((link) => {
            link.addEventListener('mouseenter', () => {
                anime({
                    targets: link,
                    scale: [1, 1.15, 1.35],
                    duration: 600,
                    easing: 'easeOutElastic(1, .8)'
                });
            });
            
            link.addEventListener('mouseleave', () => {
                anime.set(link, {
                    scale: 1
                });
            });
        });

        // ============================================================================
        // SCROLL OR PAGE RESET - Remove parallax on leave/focus
        // ============================================================================
        document.addEventListener('mouseleave', () => {
            // Reset parallax when mouse leaves viewport
            anime({
                targets: cyberGrid,
                translateX: 0,
                translateY: 0,
                duration: 300,
                easing: 'easeOutQuad'
            });
            
            const header = document.querySelector('header');
            if (header) {
                anime({
                    targets: header,
                    translateX: 0,
                    translateY: 0,
                    duration: 300,
                    easing: 'easeOutQuad'
                });
            }
        });

    </script>

</body>
</html>
