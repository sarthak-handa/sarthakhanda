<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarthak Handa | Links</title>
    
    <link rel="icon" href="logo.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Base Variables */
        :root {
            --bg-base: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            
            --btn-bg: #0a0a0a;
            --btn-text: #ffffff;
            --btn-text-muted: #a1a1aa;
            
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* * STRICT SINGLE PAGE LOCK 
         * Uses dynamic viewport height (dvh) to account for mobile browser UI bars.
         * overflow: hidden completely prevents scrolling.
         */
        html, body {
            height: 100vh; /* Fallback */
            height: 100dvh;
            width: 100vw;
            overflow: hidden; 
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            perspective: 1000px; /* Enables 3D space */
        }

        /* * FUTURISTIC 3D CYBER-GRID BACKGROUND
         * Creates a moving grid floor that fades into the white background.
         */
        .cyber-grid {
            position: absolute;
            bottom: -20%;
            left: -50%;
            width: 200%;
            height: 60vh;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotateX(75deg);
            transform-origin: top center;
            animation: gridMove 3s linear infinite;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; } /* Matches background-size to loop seamlessly */
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers everything vertically */
            align-items: center;
            /* Dynamic padding that shrinks on small screens */
            padding: clamp(10px, 3vh, 40px) 24px; 
        }

        /* Header Styles with floating animation */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: clamp(15px, 4vh, 36px);
            animation: float 6s ease-in-out infinite, dropIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .profile-img {
            /* Aggressively scales based on available height to ensure fit */
            width: clamp(60px, 12vh, 96px);
            height: clamp(60px, 12vh, 96px);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eaeaea;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: clamp(8px, 2vh, 16px);
            transition: var(--transition-smooth);
        }

        .profile-img:hover {
            transform: scale(1.08) rotate(3deg);
            border-color: #000;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: clamp(1.1rem, 3vh, 1.35rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: clamp(0.8rem, 1.8vh, 0.95rem);
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Links Container */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 2vh, 16px);
            perspective: 1000px;
        }

        /* * PREMIUM 3D BLACK BUTTONS
         * With dynamic padding and font sizes.
         */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            text-decoration: none;
            padding: clamp(12px, 2.5vh, 18px) 24px;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
            
            /* Staggered 3D Entrance Animation Setup */
            opacity: 0;
            transform: rotateX(-30deg) translateY(20px);
            animation: flipIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Stagger the entrance of each button */
        .link-btn:nth-child(1) { animation-delay: 0.1s; }
        .link-btn:nth-child(2) { animation-delay: 0.2s; }
        .link-btn:nth-child(3) { animation-delay: 0.3s; }
        .link-btn:nth-child(4) { animation-delay: 0.4s; }
        .link-btn:nth-child(5) { animation-delay: 0.5s; }

        @keyframes flipIn {
            to { opacity: 1; transform: rotateX(0deg) translateY(0); }
        }

        /* Sleek Scanner/Shimmer effect inside the button on hover */
        .link-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-25deg);
            transition: left 0s;
        }

        .link-btn:hover::before {
            left: 200%;
            transition: left 0.6s ease-in-out;
        }

        .link-btn:hover {
            transform: translateY(-4px) scale(1.02) translateZ(10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.25);
            background-color: #000000;
        }

        .main-icon {
            font-size: clamp(1rem, 2.5vh, 1.25rem);
            color: var(--btn-text);
            width: 28px;
            text-align: center;
            transition: var(--transition-smooth);
            z-index: 1;
        }

        .link-btn:hover .main-icon {
            transform: scale(1.2) rotate(5deg);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-weight: 500;
            font-size: clamp(0.85rem, 2vh, 1rem);
            letter-spacing: -0.01em;
            padding: 0 16px;
            z-index: 1;
        }

        .arrow-icon {
            font-size: clamp(0.85rem, 2vh, 1rem);
            color: var(--btn-text-muted);
            transition: var(--transition-smooth);
            opacity: 0.6;
            z-index: 1;
        }

        .link-btn:hover .arrow-icon {
            color: var(--btn-text);
            opacity: 1;
            transform: translateX(4px);
        }

        /* Footer Socials */
        .socials-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: clamp(16px, 3vh, 28px);
            margin-top: clamp(20px, 4vh, 40px);
            padding: clamp(12px, 2vh, 18px) clamp(20px, 4vw, 32px);
            border-radius: 99px;
            background-color: #f8f8fa;
            border: 1px solid #eaeaea;
            box-shadow: inset 0 2px 4px rgba(255,255,255,1), 0 8px 20px rgba(0,0,0,0.04);
            
            opacity: 0;
            animation: dropIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        @keyframes dropIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .social-link {
            color: var(--text-muted);
            font-size: clamp(1.1rem, 3vh, 1.35rem);
            text-decoration: none;
            transition: var(--transition-smooth);
            display: inline-block;
        }

        .social-link:hover {
            color: var(--text-main);
            transform: scale(1.3) translateY(-3px);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        /* Extreme Landscape Mobile Fix to ensure everything still fits 
           if someone turns their tiny phone sideways */
        @media (orientation: landscape) and (max-height: 500px) {
            .container { flex-direction: row; gap: 40px; }
            header { margin-bottom: 0; }
            .cyber-grid { display: none; } /* Hide grid on ultra-short screens to save GPU */
            .links-container { justify-content: center; }
            .socials-container { position: absolute; bottom: 10px; padding: 8px 20px; margin-top: 0; }
        }
    </style>
</head>
